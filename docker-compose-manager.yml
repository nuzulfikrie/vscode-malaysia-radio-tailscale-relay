services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: radio-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast.xml:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8000 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q 'Icecast'"]
      interval: 30s
      timeout: 5s
      retries: 5

  relay-manager:
    build:
      context: ./relay
      dockerfile: Dockerfile.manager
    container_name: relay-manager
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    volumes:
      - ./relay/stations:/stations:ro
      - ./.env:/.env:ro
    environment:
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - ICECAST_USER=source
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD:-hackme}
    command: ["/entrypoint.sh", "start", "all"]
    # Override command to run specific stations:
    # command: ["/entrypoint.sh", "start", "ikim"]
    # command: ["/entrypoint.sh", "monitor"]
