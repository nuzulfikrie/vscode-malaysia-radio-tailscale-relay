services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: radio-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast.xml:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8000 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q 'Icecast'"]
      interval: 30s
      timeout: 5s
      retries: 5

  relay-ikim:
    build:
      context: ./relay
    container_name: relay-ikim
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    env_file:
      - ./.env
      - ./relay/stations/ikim.env

  relay-bfm:
    build:
      context: ./relay
    container_name: relay-bfm
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    env_file:
      - ./.env
      - ./relay/stations/bfm.env

  relay-zayan:
    build:
      context: ./relay
    container_name: relay-zayan
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    env_file:
      - ./.env
      - ./relay/stations/zayan.env

  relay-sinar:
    build:
      context: ./relay
    container_name: relay-sinar
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    env_file:
      - ./.env
      - ./relay/stations/sinar.env
