services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: radio-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast.xml:ro
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8000 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q 'Icecast'"]
      interval: 30s
      timeout: 5s
      retries: 5

  relay-988:
    build:
      context: ./relay
    image: relay-988:latest
    container_name: relay-988
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    env_file:
      - ./.env
      - ./relay/stations/988.env

